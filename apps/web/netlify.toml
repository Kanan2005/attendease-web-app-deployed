[build]
  command = "cd ../.. && pnpm turbo build --filter=@attendease/web"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  NEXT_PUBLIC_APP_ENV = "production"
  NEXT_PUBLIC_FEATURE_BLUETOOTH_ATTENDANCE_ENABLED = "true"
  NEXT_PUBLIC_FEATURE_EMAIL_AUTOMATION_ENABLED = "true"

[[plugins]]
  package = "@netlify/plugin-nextjs"
