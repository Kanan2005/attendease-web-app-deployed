services:
  test-postgres:
    image: postgres:16-alpine
    container_name: attendease-test-postgres
    environment:
      POSTGRES_DB: attendease_test
      POSTGRES_USER: attendease
      POSTGRES_PASSWORD: attendease
    ports:
      - "${TEST_POSTGRES_PORT:-5433}:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U attendease -d attendease_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - fsync=off
      - -c
      - synchronous_commit=off
      - -c
      - full_page_writes=off
