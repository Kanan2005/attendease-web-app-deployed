services:
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://attendease:attendease@postgres:5432/attendease
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - >-
        until pnpm --filter @attendease/db migrate:deploy; do
          echo "Migration retry: database not ready yet.";
          sleep 3;
        done
    restart: "no"

  bucket-init:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - >-
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo "Bucket init retry: MinIO not ready yet.";
          sleep 2;
        done;
        mc mb --ignore-existing local/attendease-local
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      bucket-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      APP_VERSION: 0.1.0
      LOG_LEVEL: info
      REQUEST_ID_HEADER: x-request-id
      API_PORT: 4000
      API_CORS_ALLOWED_ORIGINS: http://localhost:${WEB_HOST_PORT:-3000},http://127.0.0.1:${WEB_HOST_PORT:-3000}
      DATABASE_URL: postgresql://attendease:attendease@postgres:5432/attendease
      REDIS_URL: redis://redis:6379
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_STORE_MODE: redis
      AUTH_RATE_LIMIT_MAX: 10
      AUTH_RATE_LIMIT_WINDOW_SECONDS: 60
      ATTENDANCE_MARK_RATE_LIMIT_MAX: 6
      ATTENDANCE_MARK_RATE_LIMIT_WINDOW_SECONDS: 60
      FEATURE_BLUETOOTH_ATTENDANCE_ENABLED: "true"
      FEATURE_EMAIL_AUTOMATION_ENABLED: "true"
      FEATURE_STRICT_DEVICE_BINDING_MODE: ENFORCE
      AUTH_ISSUER: attendease-api
      AUTH_AUDIENCE: attendease-clients
      AUTH_ACCESS_TOKEN_SECRET: attendease-dev-access-token-secret-attendease
      AUTH_ACCESS_TOKEN_TTL_MINUTES: 15
      AUTH_REFRESH_TOKEN_TTL_DAYS: 30
      GOOGLE_OIDC_CLIENT_ID: attendease-google-client-id
      GOOGLE_OIDC_REDIRECT_URI: http://localhost:${API_HOST_PORT:-4000}/auth/google/callback
      GOOGLE_TEACHER_ALLOWED_DOMAINS: attendease.dev
      GOOGLE_STUDENT_ALLOWED_DOMAINS: attendease.dev
      ATTENDANCE_QR_ALLOWED_CLOCK_SKEW_SLICES: 1
      ATTENDANCE_BLUETOOTH_ALLOWED_CLOCK_SKEW_SLICES: 1
      ATTENDANCE_BLUETOOTH_PROTOCOL_VERSION: 1
      ATTENDANCE_BLUETOOTH_SERVICE_UUID: 12345678-1234-5678-1234-56789abc0001
      ATTENDANCE_GPS_MAX_ACCURACY_METERS: 100
      DEVICE_ATTESTATION_ANDROID_MODE: placeholder
      DEVICE_ATTESTATION_APPLE_MODE: placeholder
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_ENDPOINT: http://localhost:${MINIO_API_PORT:-9000}
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: attendease-local
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_FORCE_PATH_STYLE: "true"
      STORAGE_SIGNED_URL_TTL_SECONDS: 900
      EXPORT_FILE_TTL_HOURS: 72
      ROSTER_IMPORT_BATCH_SIZE: 10
      ANNOUNCEMENT_FANOUT_BATCH_SIZE: 20
      ANALYTICS_REFRESH_BATCH_SIZE: 20
      EXPORT_JOB_BATCH_SIZE: 10
      EMAIL_AUTOMATION_SCHEDULE_BATCH_SIZE: 100
      EMAIL_AUTOMATION_PROCESS_BATCH_SIZE: 10
      ROSTER_IMPORT_STUCK_TIMEOUT_MS: 900000
      OUTBOX_STUCK_TIMEOUT_MS: 900000
      EXPORT_JOB_STUCK_TIMEOUT_MS: 900000
      EMAIL_AUTOMATION_STUCK_DISPATCH_TIMEOUT_MS: 900000
      QUEUE_HEALTH_STALE_AFTER_MS: 900000
    ports:
      - "${API_HOST_PORT:-4000}:4000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch("http://127.0.0.1:4000/health").then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      bucket-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      APP_VERSION: 0.1.0
      LOG_LEVEL: info
      REQUEST_ID_HEADER: x-request-id
      WORKER_PORT: 4010
      DATABASE_URL: postgresql://attendease:attendease@postgres:5432/attendease
      REDIS_URL: redis://redis:6379
      WORKER_CYCLE_INTERVAL_MS: 5000
      FEATURE_BLUETOOTH_ATTENDANCE_ENABLED: "true"
      FEATURE_EMAIL_AUTOMATION_ENABLED: "true"
      FEATURE_STRICT_DEVICE_BINDING_MODE: ENFORCE
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_ENDPOINT: http://localhost:${MINIO_API_PORT:-9000}
      STORAGE_REGION: us-east-1
      STORAGE_BUCKET: attendease-local
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_FORCE_PATH_STYLE: "true"
      STORAGE_SIGNED_URL_TTL_SECONDS: 900
      EXPORT_FILE_TTL_HOURS: 72
      EMAIL_PROVIDER_MODE: console
      EMAIL_FROM_ADDRESS: noreply@attendease.local
      EMAIL_REPLY_TO_ADDRESS: teacher@attendease.local
      ROSTER_IMPORT_BATCH_SIZE: 10
      ANNOUNCEMENT_FANOUT_BATCH_SIZE: 20
      ANALYTICS_REFRESH_BATCH_SIZE: 20
      EXPORT_JOB_BATCH_SIZE: 10
      EMAIL_AUTOMATION_SCHEDULE_BATCH_SIZE: 100
      EMAIL_AUTOMATION_PROCESS_BATCH_SIZE: 10
      ROSTER_IMPORT_STUCK_TIMEOUT_MS: 900000
      OUTBOX_STUCK_TIMEOUT_MS: 900000
      EXPORT_JOB_STUCK_TIMEOUT_MS: 900000
      EMAIL_AUTOMATION_STUCK_DISPATCH_TIMEOUT_MS: 900000
      QUEUE_HEALTH_STALE_AFTER_MS: 900000
    healthcheck:
      test:
        - CMD-SHELL
        - pnpm health >/dev/null || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: http://localhost:${WEB_HOST_PORT:-3000}
        NEXT_PUBLIC_API_URL: http://localhost:${API_HOST_PORT:-4000}
        NEXT_PUBLIC_APP_ENV: production
        NEXT_PUBLIC_FEATURE_BLUETOOTH_ATTENDANCE_ENABLED: "true"
        NEXT_PUBLIC_FEATURE_EMAIL_AUTOMATION_ENABLED: "true"
    depends_on:
      api:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_APP_URL: http://localhost:${WEB_HOST_PORT:-3000}
      NEXT_PUBLIC_API_URL: http://localhost:${API_HOST_PORT:-4000}
      WEB_INTERNAL_API_URL: http://api:4000
      NEXT_PUBLIC_APP_ENV: production
      NEXT_PUBLIC_FEATURE_BLUETOOTH_ATTENDANCE_ENABLED: "true"
      NEXT_PUBLIC_FEATURE_EMAIL_AUTOMATION_ENABLED: "true"
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch("http://127.0.0.1:3000/health").then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
