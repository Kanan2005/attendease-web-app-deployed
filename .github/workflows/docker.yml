name: Docker Runtime

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

permissions:
  contents: read

jobs:
  docker-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Show Docker versions
        run: |
          docker version
          docker compose version

      - name: Validate runtime compose config
        run: docker compose -f docker-compose.yml -f docker-compose.runtime.yml config > /tmp/attendease-runtime-compose.yaml

      - name: Build runtime images
        run: docker compose -f docker-compose.yml -f docker-compose.runtime.yml build api worker web migrate

      - name: Start runtime stack
        run: docker compose -f docker-compose.yml -f docker-compose.runtime.yml up -d

      - name: Validate HTTP health surfaces
        run: node scripts/validate-docker-runtime.mjs

      - name: Validate worker health
        run: docker compose -f docker-compose.yml -f docker-compose.runtime.yml exec -T worker pnpm health

      - name: Show runtime status
        run: docker compose -f docker-compose.yml -f docker-compose.runtime.yml ps

      - name: Dump runtime logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.runtime.yml logs --no-log-prefix postgres redis minio mailpit migrate bucket-init api worker web

      - name: Stop runtime stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.runtime.yml down --remove-orphans --volumes
